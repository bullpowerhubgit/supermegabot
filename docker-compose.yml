###############################################################################
# RudiBot Multi-Agent System — Docker Compose
# Start all services:  docker compose up -d
# View logs:           docker compose logs -f
# Stop all:            docker compose down
###############################################################################

services:
  # ── API Gateway (Central Hub) ─────────────────────────────────────────────
  api-gateway:
    build: ../windsurf-api-gateway
    ports:
      - "8080:8080"
    env_file: ../windsurf-api-gateway/.env
    environment:
      - GATEWAY_PORT=8080
      - GITHUB_SERVICE_URL=http://github-app:3000
      - SHOPIFY_SERVICE_URL=http://shopify-suite:3001
      - TELEGRAM_SERVICE_URL=http://telegram-bot:8000
      - SHOPIFY_AI_SERVICE_URL=http://shopify-ai:3002
      - GUARDIAN_SERVICE_URL=http://guardian:3201
      - MASTER_SERVICE_URL=http://master-dashboard:9900
    depends_on:
      - master-dashboard
      - telegram-bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── SuperMegaBot Dashboard (:8888) ────────────────────────────────────────
  master-dashboard:
    build: .
    ports:
      - "8888:8888"
    env_file: .env
    environment:
      - PORT=8888
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Windsurf Telegram Bot (:8000) ─────────────────────────────────────────
  telegram-bot:
    build: ../windsurf-telegram-bot
    ports:
      - "8000:8000"
    env_file: ../windsurf-telegram-bot/.env
    environment:
      - PORT=8000
      - GATEWAY_URL=http://api-gateway:8080
    restart: unless-stopped

  # ── Windsurf Shopify Suite (:3001) ────────────────────────────────────────
  shopify-suite:
    build: ../windsurf-shopify-suite
    ports:
      - "3001:3001"
    env_file: ../windsurf-shopify-suite/.env
    environment:
      - PORT=3001
    restart: unless-stopped

  # ── Windsurf GitHub App (:3000) ───────────────────────────────────────────
  github-app:
    build: ../windsurf-github-app
    ports:
      - "3000:3000"
    env_file: ../windsurf-github-app/.env
    environment:
      - PORT=3000
    restart: unless-stopped

  # ── Telegram Automation Bot (Legacy) ──────────────────────────────────────
  telegram-automation:
    build: ../telegram-automation-bot
    env_file: ../telegram-automation-bot/.env
    restart: unless-stopped
