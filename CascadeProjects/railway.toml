[build]
builder = "nixpacks"

[deploy]
startCommand = "python3 supermegabot/dashboard/server.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"

[env]
DASHBOARD_PORT = "8888"
