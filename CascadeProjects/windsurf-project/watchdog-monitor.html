<!DOCTYPE html>
<html lang="de">
<head>
    <script src="utils/DOMHelper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchdog Live Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .card h3 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        
        .status-dot.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-label {
            color: #aaa;
        }
        
        .info-value {
            font-weight: bold;
        }
        
        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .log-entry.error {
            color: #ff4444;
        }
        
        .log-entry.warn {
            color: #ffaa00;
        }
        
        .log-entry.info {
            color: #00d4ff;
        }
        
        .log-entry.critical {
            color: #ff0066;
            font-weight: bold;
        }
        
        .alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #ff4444;
            color: white;
            font-weight: bold;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }
        
        .last-update {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .watchdog-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .watchdog-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }
        
        .watchdog-item.highlight {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
        }
    </style>
</head>
<body>
    <div class="alert-box" id="alertBox"></div>
    
    <div class="container">
        <div class="header">
            <h1>🐕 Watchdog Live Monitor</h1>
            <p>Real-time Überwachung des System Watchdogs</p>
        </div>
        
        <div class="status-grid">
            <div class="card">
                <h3>Watchdog Status</h3>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Verbinde...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">PID:</span>
                    <span class="info-value" id="pid">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Label:</span>
                    <span class="info-value" id="label">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Status:</span>
                    <span class="info-value" id="statusCode">-</span>
                </div>
            </div>
            
            <div class="card">
                <h3>System Info</h3>
                <div class="info-row">
                    <span class="info-label">Uptime:</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Total RAM:</span>
                    <span class="info-value" id="totalmem">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Free RAM:</span>
                    <span class="info-value" id="freemem">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">RAM Usage:</span>
                    <span class="info-value" id="ramusage">-</span>
                </div>
            </div>
            
            <div class="card">
                <h3>Alle Watchdogs</h3>
                <div class="watchdog-list" id="watchdogList">
                    <p>Lade...</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Watchdog Log (letzte 20 Zeilen)</h3>
            <div class="log-container" id="logContainer">
                <p>Lade Logs...</p>
            </div>
        </div>
        
        <div class="last-update">
            Letztes Update: <span id="lastUpdate">-</span>
        </div>
    </div>
    
    <script>
        const ws = new WebSocket('ws://localhost:3456');
        
        ws.onopen = () => {
            console.log('WebSocket verbunden');
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'status') {
                updateStatus(data.data);
                updateLog(data.log);
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            } else if (data.type === 'alert') {
                showAlert(data.message, data.severity);
            }
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Fehler:', error);
            document.getElementById('statusText').textContent = 'Verbindungsfehler';
            document.getElementById('statusDot').className = 'status-dot offline';
        };
        
        ws.onclose = () => {
            console.log('WebSocket getrennt');
            document.getElementById('statusText').textContent = 'Getrennt';
            document.getElementById('statusDot').className = 'status-dot offline';
            
            // Reconnect nach 5 Sekunden
            setTimeout(() => {
                location.reload();
            }, 5000);
        };
        
        function updateStatus(data) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (data.isRunning) {
                statusDot.className = 'status-dot online';
                statusText.textContent = '✅ Aktiv';
            } else {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '❌ Inaktiv';
            }
            
            if (data.ourWatchdog) {
                document.getElementById('pid').textContent = data.ourWatchdog.pid;
                document.getElementById('label').textContent = data.ourWatchdog.label;
                document.getElementById('statusCode').textContent = data.ourWatchdog.status;
            }
            
            if (data.system) {
                document.getElementById('uptime').textContent = formatUptime(data.system.uptime);
                document.getElementById('totalmem').textContent = data.system.totalmem + ' GB';
                document.getElementById('freemem').textContent = data.system.freemem + ' GB';
                
                const used = data.system.totalmem - data.system.freemem;
                const percent = Math.round((used / data.system.totalmem) * 100);
                document.getElementById('ramusage').textContent = percent + '%';
            }
            
            // Watchdog Liste
            const list = document.getElementById('watchdogList');
            list.textContent = '';
            
            if (data.watchdogs && data.watchdogs.length > 0) {
                data.watchdogs.forEach(w => {
                    const item = document.createElement('div');
                    item.className = 'watchdog-item';
                    if (w.label === 'com.supermegabot.watchdog') {
                        item.classList.add('highlight');
                    }
                    item.innerHTML = DOMHelper.sanitizeHTML('
                        <strong>${w.label}</strong><br>
                        PID: ${w.pid} | Status: ${w.status}
                    ');
                    list.appendChild(item);
                });
            } else {
                list.innerHTML = DOMHelper.sanitizeHTML('<p>Keine Watchdogs gefunden</p>');
            }
        }
        
        function updateLog(log) {
            const container = document.getElementById('logContainer');
            container.textContent = '';
            
            const lines = log.split('\n').filter(line => line.trim());
            
            lines.forEach(line => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                if (line.includes('[ERROR]')) {
                    entry.classList.add('error');
                } else if (line.includes('[WARN]')) {
                    entry.classList.add('warn');
                } else if (line.includes('[CRITICAL]')) {
                    entry.classList.add('critical');
                } else if (line.includes('[INFO]')) {
                    entry.classList.add('info');
                }
                
                entry.textContent = line;
                container.appendChild(entry);
            });
            
            // Auto-scroll nach unten
            container.scrollTop = container.scrollHeight;
        }
        
        function showAlert(message, severity) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            
            if (severity === 'critical') {
                alertBox.style.background = '#ff4444';
            } else {
                alertBox.style.background = '#ffaa00';
            }
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 10000);
        }
        
        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            if (days > 0) {
                return `${days}d ${hours}h ${minutes}m`;
            } else if (hours > 0) {
                return `${hours}h ${minutes}m`;
            } else {
                return `${minutes}m`;
            }
        }
    </script>
</body>
</html>
