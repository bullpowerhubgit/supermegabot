<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Automation Dashboard - SuperMegaBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .dark { background: #0f172a; color: #e2e8f0; }
        .dark .bg-white { background: #1e293b; }
        .dark .bg-gray-50 { background: #334155; }
        .dark .text-gray-900 { color: #f1f5f9; }
        .dark .text-gray-600 { color: #cbd5e1; }
        .dark .border-gray-200 { border-color: #475569; }
        .dark .bg-gray-800 { background: #1e293b; }
        .dark .bg-gray-700 { background: #334155; }
        .dark .text-gray-300 { color: #cbd5e1; }
        .dark .text-gray-400 { color: #94a3b8; }
        .dark .border-gray-700 { border-color: #475569; }
        .dark .hover\:bg-gray-700:hover { background: #334155; }
        .dark .bg-gray-900 { background: #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const { BarChart3, Moon, Sun, Mail, ShoppingBag, TrendingUp, MessageSquare, Facebook, Settings, CheckCircle, XCircle, Clock, DollarSign, Zap, Activity, ArrowRight } = lucide;

        const ShopifyDashboard = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('overview');
            const [automationChannels, setAutomationChannels] = useState([
                {
                    id: 1,
                    name: 'Email Automation (Abandoned Cart)',
                    score: 95,
                    status: 'active',
                    roi: '20-40x',
                    description: 'Automatische Rabatte und Email-Sequenzen für verlassene Warenkörbe',
                    metrics: { recoveryRate: 35, emailsSent: 1247, revenueRecovered: 15420 }
                },
                {
                    id: 2,
                    name: 'Social Proof & Reviews',
                    score: 75,
                    status: 'active',
                    roi: '+15% CR',
                    description: 'Automatische Review-Anfragen nach Lieferung',
                    metrics: { reviewsCollected: 89, conversionLift: 15, averageRating: 4.7 }
                },
                {
                    id: 3,
                    name: 'Post-Purchase Upsell',
                    score: 82,
                    status: 'active',
                    roi: '+20% AOV',
                    description: 'One-Click-Upsell auf Thank-You-Page',
                    metrics: { upsellRate: 18, aovIncrease: 23, additionalRevenue: 8930 }
                },
                {
                    id: 4,
                    name: 'SMS Marketing',
                    score: 70,
                    status: 'pending',
                    roi: '98% Open Rate',
                    description: 'SMS-Kampagnen für Cart Recovery',
                    metrics: { openRate: 98, smsSent: 0, conversionRate: 0 }
                },
                {
                    id: 5,
                    name: 'Facebook Retargeting',
                    score: 68,
                    status: 'pending',
                    roi: '2x ROAS',
                    description: 'Dynamische Produktanzeigen für Warenkorb-Abbrecher',
                    metrics: { roas: 0, impressions: 0, clicks: 0 }
                }
            ]);

            const renderOverview = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {[
                            { label: 'Aktive Automatisierungen', value: '3/5', icon: Activity, color: 'text-green-500' },
                            { label: 'Gesamt ROI', value: '35x', icon: DollarSign, color: 'text-yellow-500' },
                            { label: 'Umsatzsteigerung', value: '+45%', icon: TrendingUp, color: 'text-blue-500' },
                            { label: 'Recovered Revenue', value: '$24,350', icon: ShoppingBag, color: 'text-purple-500' }
                        ].map(({ label, value, icon: Icon, color }) => (
                            <div key={label} className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <Icon size={24} className={color} />
                                    <span className={`text-2xl font-bold ${darkMode ? 'text-gray-100' : 'text-gray-900'}`}>{value}</span>
                                </div>
                                <div className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{label}</div>
                            </div>
                        ))}
                    </div>

                    <div className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                        <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                            <Zap className="text-yellow-500" />
                            Automatisierungs-Kanäle
                        </h3>
                        <div className="space-y-4">
                            {automationChannels.map(channel => (
                                <div key={channel.id} className={`p-4 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-gray-50 border-gray-200'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                            {channel.status === 'active' ? (
                                                <CheckCircle size={20} className="text-green-500" />
                                            ) : (
                                                <Clock size={20} className="text-yellow-500" />
                                            )}
                                            <span className="font-semibold">{channel.name}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className={`text-sm font-bold ${channel.score >= 80 ? 'text-green-500' : channel.score >= 70 ? 'text-yellow-500' : 'text-blue-500'}`}>
                                                Score: {channel.score}/100
                                            </span>
                                            <span className={`text-sm font-bold ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                                ROI: {channel.roi}
                                            </span>
                                        </div>
                                    </div>
                                    <p className={`text-sm mb-3 ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{channel.description}</p>
                                    <div className="grid grid-cols-3 gap-2 text-xs">
                                        {Object.entries(channel.metrics).map(([key, value]) => (
                                            <div key={key} className={`p-2 rounded ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                                                <div className={darkMode ? 'text-gray-400' : 'text-gray-500'}>{key}</div>
                                                <div className="font-semibold">{value}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderChannelDetail = (channelId) => {
                const channel = automationChannels.find(c => c.id === channelId);
                if (!channel) return null;

                return (
                    <div className="space-y-6">
                        <button
                            onClick={() => setActiveTab('overview')}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-gray-100 hover:bg-gray-200'}`}
                        >
                            <ArrowRight size={16} className="rotate-180" />
                            Zurück zur Übersicht
                        </button>

                        <div className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-2xl font-bold">{channel.name}</h2>
                                {channel.status === 'active' ? (
                                    <span className="flex items-center gap-2 text-green-500">
                                        <CheckCircle size={20} />
                                        Aktiv
                                    </span>
                                ) : (
                                    <span className="flex items-center gap-2 text-yellow-500">
                                        <Clock size={20} />
                                        Ausstehend
                                    </span>
                                )}
                            </div>
                            <p className={`mb-6 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>{channel.description}</p>

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className={`p-4 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                    <div className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Score</div>
                                    <div className="text-2xl font-bold">{channel.score}/100</div>
                                </div>
                                <div className={`p-4 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                    <div className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>ROI</div>
                                    <div className="text-2xl font-bold">{channel.roi}</div>
                                </div>
                            </div>

                            <h3 className="text-lg font-semibold mb-4">Metriken</h3>
                            <div className="grid grid-cols-3 gap-4">
                                {Object.entries(channel.metrics).map(([key, value]) => (
                                    <div key={key} className={`p-4 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                        <div className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{key}</div>
                                        <div className="text-xl font-bold">{value}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSettings = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Shopify API Konfiguration</h2>
                    
                    <div className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                        <div className="space-y-4">
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                    Store URL
                                </label>
                                <input
                                    type="text"
                                    placeholder="https://your-store.myshopify.com"
                                    className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`}
                                />
                            </div>
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                    Access Token
                                </label>
                                <input
                                    type="password"
                                    placeholder="shpat_..."
                                    className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`}
                                />
                            </div>
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                    API Version
                                </label>
                                <input
                                    type="text"
                                    placeholder="2026-04"
                                    className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderContent = () => {
                if (activeTab.startsWith('channel-')) {
                    const channelId = parseInt(activeTab.split('-')[1]);
                    return renderChannelDetail(channelId);
                }
                
                switch (activeTab) {
                    case 'overview': return renderOverview();
                    case 'settings': return renderSettings();
                    default: return renderOverview();
                }
            };

            return (
                <div className={`min-h-screen ${darkMode ? 'dark bg-gray-900' : 'bg-gray-50'}`}>
                    <div className="max-w-7xl mx-auto p-6">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <ShoppingBag className="text-purple-500" />
                                    Shopify Automation Dashboard
                                </h1>
                                <p className={`${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                                    Vollautomatische Marketing-Automatisierung
                                </p>
                            </div>
                            <button
                                onClick={() => setDarkMode(!darkMode)}
                                className={`p-2 rounded-lg ${darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'}`}
                            >
                                {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                            </button>
                        </header>

                        <nav className="flex space-x-1 mb-8">
                            {[
                                { id: 'overview', label: 'Übersicht', icon: BarChart3 },
                                { id: 'settings', label: 'Einstellungen', icon: Settings }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                                        activeTab === tab.id
                                            ? 'bg-purple-500 text-white'
                                            : darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'
                                    }`}
                                >
                                    <tab.icon size={16} />
                                    {tab.label}
                                </button>
                            ))}
                        </nav>

                        <main>
                            {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ShopifyDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
