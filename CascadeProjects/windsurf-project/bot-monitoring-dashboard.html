<!DOCTYPE html>
<html lang="de">
<head>
    <script src="utils/DOMHelper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMegaBot - Unified Bot Monitoring Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .status-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
        }

        .status-card h3 {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .status-card .trend {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .status-card.active .value {
            color: #00ff88;
        }

        .status-card.warning .value {
            color: #ffaa00;
        }

        .status-card.error .value {
            color: #ff4444;
        }

        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .bot-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .bot-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
        }

        .bot-card.running {
            border-left: 4px solid #00ff88;
        }

        .bot-card.stopped {
            border-left: 4px solid #ff4444;
        }

        .bot-card.error {
            border-left: 4px solid #ffaa00;
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .bot-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
        }

        .bot-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .bot-status.running {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .bot-status.stopped {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .bot-status.error {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .bot-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.8em;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffffff;
        }

        .bot-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-start {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-stop {
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            color: #ffffff;
        }

        .btn-restart {
            background: linear-gradient(90deg, #ffaa00, #ffcc00);
            color: #1a1a2e;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .events-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .events-section h2 {
            margin-bottom: 15px;
            color: #ffffff;
        }

        .events-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        .event-item.critical {
            border-left-color: #ff4444;
        }

        .event-item.warning {
            border-left-color: #ffaa00;
        }

        .event-time {
            font-size: 0.8em;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .event-message {
            color: #ffffff;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .control-btn {
            padding: 15px 30px;
            font-size: 1.1em;
            min-width: 150px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        .last-updated {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🤖 SuperMegaBot Unified Dashboard</h1>
            <p>Spezialisierte Bot-Orchestrierung & System-Monitoring</p>
        </div>

        <div class="status-overview">
            <div class="status-card active" id="totalBots">
                <h3>Gesamt Bots</h3>
                <div class="value">5</div>
                <div class="trend">Spezialisierte Bots</div>
            </div>
            <div class="status-card active" id="activeBots">
                <h3>Aktive Bots</h3>
                <div class="value">0</div>
                <div class="trend">Laufende Prozesse</div>
            </div>
            <div class="status-card" id="totalEvents">
                <h3>Events</h3>
                <div class="value">0</div>
                <div class="trend">Gesamt Events</div>
            </div>
            <div class="status-card" id="criticalAlerts">
                <h3>Kritische Alerts</h3>
                <div class="value">0</div>
                <div class="trend">Benötigt Aufmerksamkeit</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn control-btn btn-start" onclick="startAllBots()">🚀 Alle Starten</button>
            <button class="btn control-btn btn-stop" onclick="stopAllBots()">⏹️ Alle Stoppen</button>
            <button class="btn control-btn btn-restart" onclick="refreshStatus()">🔄 Status Aktualisieren</button>
        </div>

        <div class="bots-grid" id="botsGrid">
            <!-- Bot cards werden dynamisch eingefügt -->
        </div>

        <div class="events-section">
            <h2>📋 Letzte Events</h2>
            <div class="events-list" id="eventsList">
                <!-- Events werden dynamisch eingefügt -->
            </div>
        </div>

        <div class="last-updated">
            Zuletzt aktualisiert: <span id="lastUpdated">-</span>
        </div>
    </div>

    <script>
        const botConfigs = {
            monitoring: {
                name: 'Monitoring Bot',
                description: 'Systemüberwachung, API-Status, Performance-Metriken',
                interval: '30s',
                priority: 'high'
            },
            repair: {
                name: 'Repair Bot',
                description: 'Automatische Fehlerbehebung, Cache-Cleanup, Log-Rotation',
                interval: '60s',
                priority: 'medium'
            },
            optimization: {
                name: 'Optimization Bot',
                description: 'Performance-Tuning, Bundle-Size, Code-Qualität',
                interval: '300s',
                priority: 'low'
            },
            errorDetection: {
                name: 'Error Detection Bot',
                description: 'Fehlererkennung, Log-Analyse, Exception-Tracking',
                interval: '45s',
                priority: 'high'
            },
            maintenance: {
                name: 'Maintenance Bot',
                description: 'Health-Checks, Backup-Verifikation, Update-Prüfung',
                interval: '120s',
                priority: 'medium'
            }
        };

        let botStatuses = {};

        function initializeDashboard() {
            renderBotCards();
            updateLastUpdated();
            setInterval(refreshStatus, 5000);
        }

        function renderBotCards() {
            const grid = document.getElementById('botsGrid');
            grid.textContent = '';

            for (const [botId, config] of Object.entries(botConfigs)) {
                const card = document.createElement('div');
                card.className = 'bot-card stopped';
                card.id = `bot-${botId}`;
                card.textContent = '
                    <div class='bot-header">
                        <div class="bot-name">${config.name}</div>
                        <div class="bot-status stopped" id="status-${botId}">Gestoppt</div>
                    </div>
                    <div class="bot-metrics">
                        <div class="metric">
                            <div class="metric-label">Interval</div>
                            <div class="metric-value">${config.interval}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Priorität</div>
                            <div class="metric-value">${config.priority}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Restarts</div>
                            <div class="metric-value" id="restarts-${botId}">0</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Uptime</div>
                            <div class="metric-value" id="uptime-${botId}">-</div>
                        </div>
                    </div>
                    <div class="bot-actions">
                        <button class="btn btn-start" onclick="startBot('${botId}')">Start</button>
                        <button class="btn btn-stop" onclick="stopBot('${botId}')">Stop</button>
                        <button class="btn btn-restart" onclick="restartBot('${botId}')">Restart</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function updateBotStatus(botId, status) {
            botStatuses[botId] = status;
            const card = document.getElementById(`bot-${botId}`);
            const statusBadge = document.getElementById(`status-${botId}`);
            
            card.className = `bot-card ${status.running ? 'running' : 'stopped'}`;
            statusBadge.className = `bot-status ${status.running ? 'running' : 'stopped'}`;
            statusBadge.textContent = status.running ? 'Aktiv' : 'Gestoppt';

            if (status.restartCount !== undefined) {
                document.getElementById(`restarts-${botId}`).textContent = status.restartCount;
            }

            if (status.uptime) {
                document.getElementById(`uptime-${botId}`).textContent = status.uptime;
            }

            updateOverview();
        }

        function updateOverview() {
            const activeBots = Object.values(botStatuses).filter(s => s.running).length;
            document.getElementById('activeBots').querySelector('.value').textContent = activeBots;
        }

        function addEvent(message, type = 'info') {
            const eventsList = document.getElementById('eventsList');
            const eventItem = document.createElement('div');
            eventItem.className = `event-item ${type}`;
            
            const time = new Date().toLocaleTimeString('de-DE');
            eventItem.textContent = '
                <div class='event-time">${time}</div>
                <div class="event-message">${message}</div>
            `;
            
            eventsList.insertBefore(eventItem, eventsList.firstChild);
            
            // Keep only last 20 events
            while (eventsList.children.length > 20) {
                eventsList.removeChild(eventsList.lastChild);
            }

            const totalEvents = parseInt(document.getElementById('totalEvents').querySelector('.value').textContent);
            document.getElementById('totalEvents').querySelector('.value').textContent = totalEvents + 1;

            if (type === 'critical') {
                const criticalAlerts = parseInt(document.getElementById('criticalAlerts').querySelector('.value').textContent);
                document.getElementById('criticalAlerts').querySelector('.value').textContent = criticalAlerts + 1;
            }
        }

        function startBot(botId) {
            addEvent(`${botConfigs[botId].name} wird gestartet...`, 'info');
            updateBotStatus(botId, { running: true, restartCount: 0, uptime: '0s' });
            setTimeout(() => {
                addEvent(`${botConfigs[botId].name} erfolgreich gestartet`, 'info');
            }, 1000);
        }

        function stopBot(botId) {
            addEvent(`${botConfigs[botId].name} wird gestoppt...`, 'warning');
            updateBotStatus(botId, { running: false, restartCount: botStatuses[botId]?.restartCount || 0, uptime: '-' });
            setTimeout(() => {
                addEvent(`${botConfigs[botId].name} erfolgreich gestoppt`, 'info');
            }, 1000);
        }

        function restartBot(botId) {
            addEvent(`${botConfigs[botId].name} wird neu gestartet...`, 'warning');
            const currentRestarts = botStatuses[botId]?.restartCount || 0;
            updateBotStatus(botId, { running: true, restartCount: currentRestarts + 1, uptime: '0s' });
            setTimeout(() => {
                addEvent(`${botConfigs[botId].name} erfolgreich neu gestartet`, 'info');
            }, 1500);
        }

        function startAllBots() {
            addEvent('Alle Bots werden gestartet...', 'info');
            for (const botId of Object.keys(botConfigs)) {
                setTimeout(() => startBot(botId), Object.keys(botConfigs).indexOf(botId) * 500);
            }
        }

        function stopAllBots() {
            addEvent('Alle Bots werden gestoppt...', 'warning');
            for (const botId of Object.keys(botConfigs)) {
                setTimeout(() => stopBot(botId), Object.keys(botConfigs).indexOf(botId) * 500);
            }
        }

        function refreshStatus() {
            addEvent('Status wird aktualisiert...', 'info');
            updateLastUpdated();
            
            // Simulate status refresh
            for (const botId of Object.keys(botConfigs)) {
                if (botStatuses[botId]?.running) {
                    const currentUptime = botStatuses[botId]?.uptime || '0s';
                    const uptimeSeconds = parseInt(currentUptime) || 0;
                    const newUptime = `${uptimeSeconds + 5}s`;
                    updateBotStatus(botId, { 
                        running: true, 
                        restartCount: botStatuses[botId]?.restartCount || 0, 
                        uptime: newUptime 
                    });
                }
            }
        }

        function updateLastUpdated() {
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString('de-DE');
        }

        // Initialize dashboard on load
        document.addEventListener('DOMContentLoaded', initializeDashboard);
    </script>
</body>
</html>
