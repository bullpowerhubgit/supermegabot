<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoShop Suite - POD & Dropshipping Automation</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .dark { background: #0f172a; color: #e2e8f0; }
        .dark .bg-white { background: #1e293b; }
        .dark .bg-gray-50 { background: #334155; }
        .dark .text-gray-900 { color: #f1f5f9; }
        .dark .text-gray-600 { color: #cbd5e1; }
        .dark .border-gray-200 { border-color: #475569; }
        .dark .bg-gray-800 { background: #1e293b; }
        .dark .bg-gray-700 { background: #334155; }
        .dark .text-gray-300 { color: #cbd5e1; }
        .dark .text-gray-400 { color: #94a3b8; }
        .dark .border-gray-700 { border-color: #475569; }
        .dark .hover\\:bg-gray-700:hover { background: #334155; }
        .dark .bg-gray-900 { background: #0f172a; }
        .pipe-step { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            padding: 0.5rem; 
            border-radius: 0.5rem; 
            background: rgba(59, 130, 246, 0.1); 
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .pipe-step.completed { 
            background: rgba(34, 197, 94, 0.1); 
            border-color: rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { Package, ShoppingCart, Palette, Tag, Search, FileText, Truck, TrendingUp, Settings, Moon, Sun, Zap, CheckCircle, AlertCircle, DollarSign, BarChart3, Upload, Download, RefreshCw, Eye, Edit, Trash2, Plus, Minus, ChevronRight, ChevronDown, Globe, Store, Printer, Box } = lucide;

        const AutoShopSuite = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('dash');
            const [podSub, setPodSub] = useState('niche');
            const [dropSub, setDropSub] = useState('research');
            const [apiConfig, setApiConfig] = useState({
                anthropic: { apiKey: '', model: 'claude-3-sonnet-20240229' },
                etsy: { apiKey: '' },
                shopify: { apiKey: '', password: '', storeUrl: '' },
                printful: { apiKey: '' },
                aliexpress: { apiKey: '' }
            });
            const [history, setHistory] = useState([]);
            const [toolStats, setToolStats] = useState({});
            const [loading, setLoading] = useState({});
            const [generatedAssets, setGeneratedAssets] = useState({});

            // Load config from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('autoshop_config');
                if (saved) {
                    setApiConfig(JSON.parse(saved));
                }
            }, []);

            const saveConfig = (config) => {
                setApiConfig(config);
                localStorage.setItem('autoshop_config', JSON.stringify(config));
            };

            const callApi = async (endpoint, data) => {
                const response = await fetch(`http://localhost:4001/api/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiConfig.anthropic?.apiKey || 'demo-key'
                    },
                    body: JSON.stringify(data)
                });
                return response.json();
            };

            const generateNiche = async () => {
                setLoading(prev => ({ ...prev, niche: true }));
                try {
                    const result = await callApi('autoshop/niche', { 
                        prompt: 'Generiere 10 profitable POD niches for 2024',
                        platform: 'etsy'
                    });
                    
                    setGeneratedAssets(prev => ({ 
                        ...prev, 
                        niches: result.niches || [
                            { name: 'Minimalist Home Decor', trend: 'up', competition: 'low', potential: 'high' },
                            { name: 'Pet Owner Accessories', trend: 'up', competition: 'medium', potential: 'high' },
                            { name: 'Fitness Motivation Quotes', trend: 'stable', competition: 'high', potential: 'medium' }
                        ]
                    }));
                    
                    setHistory(prev => [...prev, {
                        tool: 'Niche Generator',
                        input: 'Generate profitable POD niches',
                        output: JSON.stringify(result, null, 2),
                        ts: new Date().toISOString()
                    }]);
                } catch (error) {
                    console.error('Niche generation failed:', error);
                } finally {
                    setLoading(prev => ({ ...prev, niche: false }));
                }
            };

            const generateDesign = async (niche) => {
                setLoading(prev => ({ ...prev, design: true }));
                try {
                    const result = await callApi('autoshop/design', {
                        niche: niche,
                        style: 'minimalist',
                        colors: ['black', 'white', 'navy'],
                        products: ['tshirt', 'hoodie', 'mug']
                    });
                    
                    setGeneratedAssets(prev => ({ 
                        ...prev, 
                        designs: [...(prev.designs || []), {
                            id: Date.now(),
                            niche,
                            designs: result.designs || [
                                { name: 'Minimal Quote', type: 'text', content: 'Less is More' },
                                { name: 'Geometric Pattern', type: 'graphic', content: 'Clean lines and shapes' }
                            ]
                        }]
                    }));
                } catch (error) {
                    console.error('Design generation failed:', error);
                } finally {
                    setLoading(prev => ({ ...prev, design: false }));
                }
            };

            const renderDashboard = () => {
                const stats = {
                    totalDesigns: generatedAssets.designs?.length || 0,
                    totalNiches: generatedAssets.niches?.length || 0,
                    pendingOrders: 3,
                    monthlyRevenue: '$2,450',
                    conversionRate: '3.2%'
                };

                return (
                    <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            {[
                                { label: 'Designs', value: stats.totalDesigns, icon: Palette, color: 'text-purple-500' },
                                { label: 'Niches', value: stats.totalNiches, icon: TrendingUp, color: 'text-green-500' },
                                { label: 'Pending Orders', value: stats.pendingOrders, icon: ShoppingCart, color: 'text-blue-500' },
                                { label: 'Monthly Revenue', value: stats.monthlyRevenue, icon: DollarSign, color: 'text-yellow-500' }
                            ].map(({ label, value, icon: Icon, color }) => (
                                <div key={label} className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <Icon size={24} className={color} />
                                        <span className={`text-2xl font-bold ${darkMode ? 'text-gray-100' : 'text-gray-900'}`}>{value}</span>
                                    </div>
                                    <div className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{label}</div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <TrendingUp className="text-green-500" />
                                    Quick Actions
                                </h3>
                                <div className="space-y-3">
                                    <button
                                        onClick={() => { setActiveTab('pod'); setPodSub('niche'); }}
                                        className="w-full py-3 px-4 bg-purple-500 hover:bg-purple-600 text-white rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
                                    >
                                        <Package size={16} />
                                        Generate New Niche
                                    </button>
                                    <button
                                        onClick={() => { setActiveTab('pod'); setPodSub('design'); }}
                                        className="w-full py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
                                    >
                                        <Palette size={16} />
                                        Create Design
                                    </button>
                                    <button
                                        onClick={() => setActiveTab('drop')}
                                        className="w-full py-3 px-4 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
                                    >
                                        <Search size={16} />
                                        Research Products
                                    </button>
                                </div>
                            </div>

                            <div className={`p-6 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <BarChart3 className="text-yellow-500" />
                                    Recent Activity
                                </h3>
                                <div className="space-y-3">
                                    {history.slice(-5).reverse().map((item, idx) => (
                                        <div key={idx} className={`p-3 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                            <div className="font-medium text-sm">{item.tool}</div>
                                            <div className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'} mt-1`}>
                                                {new Date(item.ts).toLocaleString()}
                                            </div>
                                        </div>
                                    ))}
                                    {history.length === 0 && (
                                        <div className={`text-center py-4 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                                            No recent activity
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderPOD = () => {
                const renderNiche = () => (
                    <div className="space-y-6">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-bold">Niche Research</h2>
                            <button
                                onClick={generateNiche}
                                disabled={loading.niche}
                                className="py-2 px-4 bg-purple-500 hover:bg-purple-600 disabled:bg-gray-400 text-white rounded-lg font-semibold transition-colors flex items-center gap-2"
                            >
                                {loading.niche ? <RefreshCw className="animate-spin" size={16} /> : <Plus size={16} />}
                                Generate Niches
                            </button>
                        </div>

                        {generatedAssets.niches && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {generatedAssets.niches.map((niche, idx) => (
                                    <div key={idx} className={`p-4 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                        <h3 className="font-semibold mb-2">{niche.name}</h3>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span>Trend:</span>
                                                <span className={`font-medium ${niche.trend === 'up' ? 'text-green-500' : niche.trend === 'down' ? 'text-red-500' : 'text-yellow-500'}`}>
                                                    {niche.trend}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span>Competition:</span>
                                                <span className={`font-medium ${niche.competition === 'low' ? 'text-green-500' : niche.competition === 'high' ? 'text-red-500' : 'text-yellow-500'}`}>
                                                    {niche.competition}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span>Potential:</span>
                                                <span className={`font-medium ${niche.potential === 'high' ? 'text-green-500' : niche.potential === 'low' ? 'text-red-500' : 'text-yellow-500'}`}>
                                                    {niche.potential}
                                                </span>
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => generateDesign(niche.name)}
                                            className="w-full mt-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-semibold transition-colors"
                                        >
                                            Create Designs
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );

                const renderDesign = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Design Generation</h2>
                        
                        {generatedAssets.designs && generatedAssets.designs.length > 0 ? (
                            <div className="space-y-4">
                                {generatedAssets.designs.map((designSet) => (
                                    <div key={designSet.id} className={`p-6 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                        <h3 className="font-semibold mb-4">Designs for: {designSet.niche}</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {designSet.designs.map((design, idx) => (
                                                <div key={idx} className={`p-4 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                                    <h4 className="font-medium mb-2">{design.name}</h4>
                                                    <p className={`text-sm ${darkMode ? 'text-gray-300' : 'text-gray-600'} mb-3`}>{design.content}</p>
                                                    <div className="flex gap-2">
                                                        <button className="py-1 px-3 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm">
                                                            <Eye size={14} />
                                                        </button>
                                                        <button className="py-1 px-3 bg-green-500 hover:bg-green-600 text-white rounded text-sm">
                                                            <Edit size={14} />
                                                        </button>
                                                        <button className="py-1 px-3 bg-purple-500 hover:bg-purple-600 text-white rounded text-sm">
                                                            <Upload size={14} />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                <Palette size={48} className="mx-auto mb-4 opacity-50" />
                                <p>No designs generated yet. Start by researching niches.</p>
                            </div>
                        )}
                    </div>
                );

                const renderListing = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Product Listings</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <FileText size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Product listing management coming soon...</p>
                        </div>
                    </div>
                );

                const renderTags = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">SEO Tags</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <Tag size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Tag optimization coming soon...</p>
                        </div>
                    </div>
                );

                return (
                    <div className="space-y-6">
                        <div className="flex space-x-1">
                            {[
                                { id: 'niche', label: 'Niche', icon: TrendingUp },
                                { id: 'design', label: 'Design', icon: Palette },
                                { id: 'listing', label: 'Listing', icon: FileText },
                                { id: 'tags', label: 'Tags', icon: Tag }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setPodSub(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                                        podSub === tab.id
                                            ? 'bg-purple-500 text-white'
                                            : darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'
                                    }`}
                                >
                                    <tab.icon size={16} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {podSub === 'niche' && renderNiche()}
                        {podSub === 'design' && renderDesign()}
                        {podSub === 'listing' && renderListing()}
                        {podSub === 'tags' && renderTags()}
                    </div>
                );
            };

            const renderDropshipping = () => {
                const renderResearch = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Product Research</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <Search size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Dropshipping research tools coming soon...</p>
                        </div>
                    </div>
                );

                const renderDescription = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Product Descriptions</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <FileText size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Description generator coming soon...</p>
                        </div>
                    </div>
                );

                const renderSupplier = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Supplier Management</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <Truck size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Supplier database coming soon...</p>
                        </div>
                    </div>
                );

                const renderAds = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">Ad Campaigns</h2>
                        <div className={`text-center py-12 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                            <TrendingUp size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Ad campaign tools coming soon...</p>
                        </div>
                    </div>
                );

                return (
                    <div className="space-y-6">
                        <div className="flex space-x-1">
                            {[
                                { id: 'research', label: 'Research', icon: Search },
                                { id: 'desc', label: 'Description', icon: FileText },
                                { id: 'supplier', label: 'Supplier', icon: Truck },
                                { id: 'ads', label: 'Ads', icon: TrendingUp }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setDropSub(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                                        dropSub === tab.id
                                            ? 'bg-green-500 text-white'
                                            : darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'
                                    }`}
                                >
                                    <tab.icon size={16} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {dropSub === 'research' && renderResearch()}
                        {dropSub === 'desc' && renderDescription()}
                        {dropSub === 'supplier' && renderSupplier()}
                        {dropSub === 'ads' && renderAds()}
                    </div>
                );
            };

            const renderWorkflows = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Automation Workflows</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className={`p-6 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                            <h3 className="font-semibold mb-4">Niche → Design → Listing Pipeline</h3>
                            <div className="space-y-3">
                                {['Research Trending Niches', 'Generate AI Designs', 'Create Product Listings', 'Optimize SEO Tags'].map((step, idx) => (
                                    <div key={idx} className="pipe-step">
                                        <CheckCircle size={16} className="text-green-500" />
                                        <span className="text-sm">{step}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className={`p-6 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                            <h3 className="font-semibold mb-4">Dropshipping Pipeline</h3>
                            <div className="space-y-3">
                                {['Research Products', 'Find Suppliers', 'Generate Descriptions', 'Launch Ads'].map((step, idx) => (
                                    <div key={idx} className="pipe-step">
                                        <CheckCircle size={16} className="text-green-500" />
                                        <span className="text-sm">{step}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderPricing = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Pricing Calculator</h2>
                    <div className={`p-6 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Base Cost</label>
                                <input type="number" placeholder="10.00" className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`} />
                            </div>
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Markup %</label>
                                <input type="number" placeholder="300" className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`} />
                            </div>
                            <div>
                                <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Platform Fee %</label>
                                <input type="number" placeholder="15" className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`} />
                            </div>
                        </div>
                        <div className="mt-6 p-4 rounded-lg bg-blue-50 dark:bg-blue-900/20">
                            <div className="text-sm text-blue-600 dark:text-blue-400">Estimated Profit: $35.00 per sale</div>
                        </div>
                    </div>
                </div>
            );

            const renderSettings = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">API Configuration</h2>
                    <div className="space-y-4">
                        {Object.entries(apiConfig).map(([service, config]) => (
                            <div key={service} className={`p-4 rounded-lg border ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                <h3 className="font-semibold mb-3 capitalize">{service}</h3>
                                {Object.entries(config).map(([key, value]) => (
                                    <div key={key} className="mb-3">
                                        <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                            {key.charAt(0).toUpperCase() + key.slice(1)}
                                        </label>
                                        <input
                                            type={key.includes('password') || key === 'apiKey' ? 'password' : 'text'}
                                            value={value}
                                            onChange={(e) => {
                                                const newConfig = {
                                                    ...apiConfig,
                                                    [service]: {
                                                        ...config,
                                                        [key]: e.target.value
                                                    }
                                                };
                                                saveConfig(newConfig);
                                            }}
                                            className={`w-full p-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-white border-gray-300'}`}
                                        />
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderContent = () => {
                switch (activeTab) {
                    case 'dash': return renderDashboard();
                    case 'pod': return renderPOD();
                    case 'drop': return renderDropshipping();
                    case 'workflows': return renderWorkflows();
                    case 'pricing': return renderPricing();
                    case 'settings': return renderSettings();
                    default: return renderDashboard();
                }
            };

            return (
                <div className={`min-h-screen ${darkMode ? 'dark bg-gray-900' : 'bg-gray-50'}`}>
                    <div className="max-w-7xl mx-auto p-6">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <Package className="text-purple-500" />
                                    AutoShop Suite
                                </h1>
                                <p className={`${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                                    POD & Dropshipping Automation Platform
                                </p>
                            </div>
                            <button
                                onClick={() => setDarkMode(!darkMode)}
                                className={`p-2 rounded-lg ${darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'}`}
                            >
                                {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                            </button>
                        </header>

                        <nav className="flex space-x-1 mb-8 overflow-x-auto">
                            {[
                                { id: 'dash', label: 'Dashboard', icon: BarChart3 },
                                { id: 'pod', label: 'Print-on-Demand', icon: Palette },
                                { id: 'drop', label: 'Dropshipping', icon: ShoppingCart },
                                { id: 'workflows', label: 'Workflows', icon: RefreshCw },
                                { id: 'pricing', label: 'Pricing', icon: DollarSign },
                                { id: 'settings', label: 'Settings', icon: Settings }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-colors whitespace-nowrap ${
                                        activeTab === tab.id
                                            ? 'bg-purple-500 text-white'
                                            : darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-100'
                                    }`}
                                >
                                    <tab.icon size={16} />
                                    {tab.label}
                                </button>
                            ))}
                        </nav>

                        <main>
                            {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AutoShopSuite />, document.getElementById('root'));
    </script>
</body>
</html>
