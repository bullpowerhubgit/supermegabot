<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperMegaBot App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #000000);
      --btn: var(--tg-theme-button-color, #2481cc);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #999999);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: var(--hint); font-size: 14px; margin-bottom: 24px; }
    .card {
      background: rgba(128,128,128,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h3 { font-size: 14px; color: var(--hint); margin-bottom: 4px; }
    .card p { font-size: 16px; font-weight: 600; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--btn);
      color: var(--btn-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:active { opacity: 0.8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>SuperMegaBot</h1>
  <p class="subtitle" id="userName">Lade...</p>

  <div class="card">
    <h3>Deine Telegram ID</h3>
    <p id="userId">—</p>
  </div>

  <div class="card">
    <h3>Plattform</h3>
    <p id="platform">—</p>
  </div>

  <button onclick="sendToBot()">📤 Daten an Bot senden</button>
  <button onclick="toggleTheme()">🌗 Theme wechseln</button>

  <script>
    const tg = window.Telegram.WebApp
    tg.ready()
    tg.expand()

    const user = tg.initDataUnsafe?.user || {}
    document.getElementById('userName').innerText = user.first_name
      ? `Hallo, ${user.first_name}!`
      : 'Willkommen!'
    document.getElementById('userId').innerText = user.id || 'Unbekannt'
    document.getElementById('platform').innerText = tg.platform || 'unknown'

    tg.MainButton.setText('Schließen')
    tg.MainButton.show()
    tg.MainButton.onClick(() => tg.close())

    function sendToBot() {
      const payload = {
        action: 'user_action',
        timestamp: Date.now(),
        user_id: user.id,
        platform: tg.platform,
        theme: tg.colorScheme
      }
      tg.sendData(JSON.stringify(payload))
    }

    function toggleTheme() {
      document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'none' : 'invert(1)'
    }
  </script>
</body>
</html>
