name: Autopost — Shopify → Facebook + Telegram

on:
  schedule:
    - cron: "0 6 * * *"   # 08:00 CEST
    - cron: "0 10 * * *"  # 12:00 CEST
    - cron: "0 14 * * *"  # 16:00 CEST
    - cron: "0 18 * * *"  # 20:00 CEST
  workflow_dispatch:       # manuell startbar

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: pip install requests

      - name: Autopost ausführen
        env:
          SHOPIFY_SHOP_DOMAIN:    ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          FACEBOOK_PAGE_ID:       ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN:    ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/autopost.py
