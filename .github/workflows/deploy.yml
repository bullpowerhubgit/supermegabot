name: CI — Syntax Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python3 -m py_compile dashboard/server.py
          for f in modules/*.py core/*.py; do python3 -m py_compile "$f"; done
          echo "All Python files OK"
      - name: Deploy note
        run: echo "✅ Syntax OK — Railway GitHub App deployt automatisch auf push zu main"
