name: CI — Syntax Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python3 -m py_compile dashboard/server.py
          for f in modules/*.py core/*.py; do python3 -m py_compile "$f"; done
          echo "All Python files OK"
      - name: StripeGuard permanent regression
        run: |
          python3 - <<'PY'
          from modules.stripe_guards import self_check
          r = self_check()
          assert r["ok"], r
          names = {c["name"] for c in r["checks"]}
          required = {
              "block_pm_card_visa_live",
              "process_block_live_pm",
              "urlquote_product_name",
              "process_sanitize_plink_url",
              "strip_type_from_prices",
              "process_strip_type_from_url",
          }
          missing = required - names
          assert not missing, f"missing checks: {missing}"
          print("StripeGuard self_check OK:", len(r["checks"]), "checks")
          PY
      - name: Posting system audit
        run: |
          python3 scripts/audit_posting_system.py
      - name: Deploy note
        run: echo "✅ Syntax OK — Railway GitHub App deployt automatisch auf push zu main"
