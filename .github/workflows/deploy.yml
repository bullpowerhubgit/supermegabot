name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python3 -m py_compile dashboard/server.py
          for f in modules/*.py core/*.py; do python3 -m py_compile "$f" && echo "OK: $f" || exit 1; done
          echo "All Python files OK"

  deploy:
    needs: syntax-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Option A: Deploy Hook (preferred — no token needed)
      - name: Trigger Railway Deploy Hook
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"
          echo "Deploy hook triggered"

      # Option B: Railway CLI with project token
      - name: Deploy via Railway CLI
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK == '' && secrets.RAILWAY_TOKEN != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --detach --service dudirudibot-mega
