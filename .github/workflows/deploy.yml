name: CI — Syntax Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python3 -m py_compile dashboard/server.py
          for f in modules/*.py core/*.py; do python3 -m py_compile "$f"; done
          echo "All Python files OK"
      - name: StripeGuard permanent regression
        run: |
          python3 - <<'PY'
          from modules.stripe_guards import self_check
          r = self_check()
          assert r["ok"], r
          names = {c["name"] for c in r["checks"]}
          required = {
              "block_pm_card_visa_live",
              "process_block_live_pm",
              "urlquote_product_name",
              "process_sanitize_plink_url",
              "strip_type_from_prices",
              "process_strip_type_from_url",
          }
          missing = required - names
          assert not missing, f"missing checks: {missing}"
          print("StripeGuard self_check OK:", len(r["checks"]), "checks")
          PY
      - name: Posting system audit
        run: |
          python3 scripts/audit_posting_system.py
      - name: Stripe BULLPOWER-ONLY (never AIITEC account)
        run: |
          python3 - <<'PY'
          import os
          # Simulate wrong AIITEC key present — must be rejected
          os.environ["STRIPE_SECRET_KEY"] = "sk_live_51Tg1U0RJECiV6vSmBULLPOWER_TEST_KEY_XXXXXX"
          os.environ["STRIPE_SECRET_KEY_AIITEC"] = "sk_live_51SwsoNFZGd8AIITEC_WRONG_ACCOUNT_YYYY"
          from modules.stripe_key_resolver import (
              get_working_stripe_key,
              is_banned_key,
              is_bullpower_key,
              purge_forbidden_from_environ,
              assert_bullpower_only,
              BULLPOWER_ACCOUNT_ID,
              BULLPOWER_EMAIL,
          )
          assert is_banned_key("sk_live_51SwsoNF_anything"), "AIITEC must be banned"
          assert is_bullpower_key("sk_live_51Tg1U0R_anything"), "bullpower prefix required"
          purge_forbidden_from_environ()
          assert not os.getenv("STRIPE_SECRET_KEY_AIITEC"), "AIITEC must be purged from env"
          k = get_working_stripe_key()
          assert k.startswith("sk_live_51Tg1U"), k
          assert_bullpower_only(k)
          try:
              assert_bullpower_only("sk_live_51Swso_FAKE")
              raise SystemExit("should have rejected AIITEC")
          except RuntimeError:
              pass
          print("Stripe BULLPOWER-ONLY OK:", BULLPOWER_EMAIL, BULLPOWER_ACCOUNT_ID)
          PY
      - name: Meta token resolver (AiiteC aliases never IWIN)
        run: |
          python3 - <<'PY'
          import os
          # Simulate wrong IWIN bleed into default aliases — resolver must fix
          os.environ["FACEBOOK_PAGE_TOKEN_AIITEC"] = "EAA_AIITEC_CANONICAL_TOKEN_VALUE_XXXXXXXX"
          os.environ["FACEBOOK_PAGE_TOKEN"] = "EAA_IWIN_WRONG_TOKEN_VALUE_YYYYYYYY"
          os.environ["FB_PAGE_TOKEN"] = "EAA_OLD_WRONG_TOKEN_VALUE_ZZZZZZZZ"
          from modules.meta_token_resolver import (
              apply_aiitec_aliases_to_process,
              audit_aliases,
              get_aiitec_page_token,
              AIITEC_TOKEN_ALIASES,
          )
          t = get_aiitec_page_token()
          assert t.startswith("EAA_AIITEC"), t
          apply_aiitec_aliases_to_process(t)
          aud = audit_aliases()
          assert aud["ok"], aud
          for k in AIITEC_TOKEN_ALIASES:
              assert os.environ.get(k) == t, (k, os.environ.get(k))
          print("MetaTokenResolver OK:", len(AIITEC_TOKEN_ALIASES), "aliases forced to AiiteC")
          PY
      - name: Autonomous loop modules compile
        run: |
          python3 -m py_compile \
            modules/autonomous_loop.py \
            modules/analytics_feedback.py \
            modules/lemon_squeezy_autopilot.py \
            modules/email_onboarding_autopilot.py \
            modules/claude_agent_collab.py
          echo "Autonomous loop modules OK"

      - name: Deploy note
        run: |
          echo "✅ Syntax OK — Railway GitHub App auto-deploys on push to main"
          echo "✅ Vercel projects auto-deploy when connected repos push"
          echo "⚡ Autonomous loop: python3 -m modules.autonomous_loop"
