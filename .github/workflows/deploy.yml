name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python3 -m py_compile dashboard/server.py
          for f in modules/*.py core/*.py; do python3 -m py_compile "$f"; done
          echo "All Python files OK"

  deploy:
    needs: syntax-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via Railway GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(commitSha: \\\"$COMMIT_SHA\\\", environmentId: \\\"0cf838ab-0358-4536-a6da-d4885aa93695\\\", serviceId: \\\"fd111f3a-0bbc-407c-9e0d-1d77974b4de0\\\") }\"}")
          echo "Railway response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceInstanceDeployV2'])" 2>/dev/null)
          if [ -z "$DEPLOY_ID" ]; then
            echo "ERROR: Deploy trigger failed. Response: $RESPONSE"
            exit 1
          fi
          echo "Deployment triggered: $DEPLOY_ID"
