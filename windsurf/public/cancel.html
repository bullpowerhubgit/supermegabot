<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlung Abgebrochen - Apitool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .cancel-card { background: #1a1f4b; padding: 60px; border-radius: 20px; text-align: center; max-width: 500px; }
        h1 { color: #fbbf24; margin-bottom: 20px; }
        p { opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; padding: 15px 40px; background: #667eea; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="cancel-card">
        <h1>Zahlung Abgebrochen</h1>
        <p>Die Zahlung wurde abgebrochen. Keine Sorge - es wurde nichts berechnet. Du kannst es jederzeit wieder versuchen.</p>
        <a href="/" class="btn">Zuruck zur Startseite</a>
    </div>
</body>
</html>
