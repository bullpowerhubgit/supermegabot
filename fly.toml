# Fly.io configuration — Free alternative to Railway
# Free tier: 3 shared-CPU VMs, 256MB RAM, no sleep
# Deploy: fly deploy (after fly auth login)
# Docs: https://fly.io/docs/

app = "supermegabot-rudibot"
primary_region = "fra"  # Frankfurt — nahe bei Deutschland

[build]
  builder = "paketobuildpacks/builder:base"

[build.args]
  BP_CPYTHON_VERSION = "3.11"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep alive (never sleep)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/health"
    port = 8080
    timeout = "10s"
    type = "http"
