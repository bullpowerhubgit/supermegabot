:root {
  --bg:       #080810;

  --accent:   #7c6fff;
  --accent2:  #00cfaa;

  --warn:     #f5a623;
  --success:  #2ecc71;
  --text:     #ddddf0;
  --muted:    #6868a0;
  --dim:      #444470;
  --tag-bg:   #1a1a30;
  --radius:   10px;
  --shadow:   0 2px 20px rgba(0,0,0,.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── NAV ── */
#nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,16,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
#nav h1 {
  font-size: 17px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
#search {
  flex: 1; min-width: 180px; max-width: 320px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 12px;
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color .15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--dim); }

.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.f-btn {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border2); background: var(--tag-bg);
  color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.f-btn:hover { border-color: var(--accent); color: var(--text); }
.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

#stats-bar {
  padding: 8px 20px;
  display: flex; gap: 20px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-n { font-size: 18px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
.stat-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

/* ── MAIN ── */
#main { padding: 20px; max-width: 1600px; margin: 0 auto; }

.section { margin-bottom: 30px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  cursor: pointer;
}
.section-icon { font-size: 20px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.section-count {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  background: var(--tag-bg); color: var(--muted);
}
.section-toggle { color: var(--dim); font-size: 12px; transition: transform .2s; }
.section-toggle.open { transform: rotate(90deg); }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color .15s, transform .1s, box-shadow .15s;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--cat-color, var(--accent)), transparent);
  opacity: .7;
}
.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.card.hidden { display: none !important; }

.card-head { display: flex; align-items: flex-start; gap: 8px; }
.card-icon { font-size: 18px; flex-shrink: 0; line-height: 1.2; }
.card-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  line-height: 1.3; flex: 1;
}
.card-status {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0; align-self: flex-start;
  margin-top: 2px;
}
.status-live    { background: rgba(46,204,113,.15); color: var(--success); border: 1px solid rgba(46,204,113,.3); }
.status-active  { background: rgba(124,111,255,.15); color: var(--accent); border: 1px solid rgba(124,111,255,.3); }
.status-local   { background: rgba(0,207,170,.15); color: var(--accent2); border: 1px solid rgba(0,207,170,.3); }
.status-wip     { background: rgba(245,166,35,.15); color: var(--warn); border: 1px solid rgba(245,166,35,.3); }
.status-archive { background: rgba(104,104,160,.15); color: var(--dim); border: 1px solid rgba(104,104,160,.3); }

.card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--tag-bg); color: var(--dim); border: 1px solid var(--border);
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 6px; }
.btn {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--tag-bg);
  color: var(--muted); cursor: pointer; transition: all .15s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--text); background: rgba(124,111,255,.1); }
.btn-live { border-color: rgba(46,204,113,.4); color: var(--success); }
.btn-live:hover { background: rgba(46,204,113,.1); }
.btn-copy { position: relative; }
.copy-toast {
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--accent2); color: #000; font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.copy-toast.show { opacity: 1; }

/* ── NETLIFY GRID ── */
#netlify-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.netlify-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
  transition: border-color .15s;
}
.netlify-card:hover { border-color: rgba(0,207,170,.4); }
.netlify-title { font-size: 11px; font-weight: 700; color: var(--accent2); }
.netlify-url { font-size: 10px; color: var(--dim); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.netlify-open { font-size: 10px; color: var(--accent2); text-decoration: none; }
.netlify-open:hover { text-decoration: underline; }

/* ── EMPTY ── */
#empty { display: none; text-align: center; padding: 60px 20px; color: var(--muted); }
#empty.show { display: block; }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 30px;
  color: var(--dim); font-size: 11px;
  border-top: 1px solid var(--border);
}

@media (max-width: 600px) {
  .cards { grid-template-columns: 1fr; }
  #stats-bar { gap: 12px; }
}
</style>

let activeFilter = 'all';

function setFilter(btn, f) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = f;
  filterAll();
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;

  document.querySelectorAll('.card').forEach(card => {
    const cats = (card.dataset.cats || '').split(',');
    const text = card.dataset.text || '';
    const catOk = activeFilter === 'all' || cats.includes(activeFilter);
    const textOk = !q || text.includes(q);
    const show = catOk && textOk;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Toggle section visibility
  document.querySelectorAll('.section').forEach(sec => {
    const cards = sec.querySelectorAll('.card:not(.hidden)');
    sec.style.display = cards.length === 0 ? 'none' : '';
  });

  document.getElementById('empty').classList.toggle('show', visible === 0);
  document.getElementById('s-total').textContent = visible;
}

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = btn.querySelector('.copy-toast');
    if (t) { t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }
  });
}

function toggleSection(header) {
  const cards = header.nextElementSibling;
  const toggle = header.querySelector('.section-toggle');
  const hidden = cards.style.display === 'none';
  cards.style.display = hidden ? '' : 'none';
  toggle.classList.toggle('open', hidden);
}

// Build page
function build() {
  const main = document.getElementById('main');

  // Group by category
  const groups = {};
  PROJECTS.forEach(p => {
    if (!groups[p.cat]) groups[p.cat] = [];
    groups[p.cat].push(p);
  });

  const catOrder = ['live','shopify','bot','revenue','ai','social','infra','tool','local'];
  catOrder.forEach(catKey => {
    if (!groups[catKey]) return;
    const c = CATS[catKey];
    const sec = document.createElement('div');
    sec.className = 'section';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.onclick = () => toggleSection(hdr);
    hdr.innerHTML = `
      <span class="section-icon">${c.icon}</span>
      <span class="section-title">${c.label}</span>
      <span class="section-count">${groups[catKey].length}</span>
      <span class="section-toggle open">▶</span>`;

    const grid = document.createElement('div');
    grid.className = 'cards';

    groups[catKey].forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.cats = p.cat;
      card.dataset.text = [p.title, p.desc, ...(p.tags||[])].join(' ').toLowerCase();
      card.style.setProperty('--cat-color', c.color);

      const statusClass = {
        live:'status-live', active:'status-active', local:'status-local',
        wip:'status-wip', archive:'status-archive'
      }[p.status] || 'status-active';

      const statusLabel = {
        live:'🟢 LIVE', active:'🔵 Aktiv', local:'💻 Lokal',
        wip:'🟡 WIP', archive:'📦 Archiv'
      }[p.status] || 'Aktiv';

      let actions = '';
      if (p.url) {
        actions += `<a class="btn btn-live" href="${p.url}" target="_blank">🔗 Öffnen</a>`;
      }
      if (p.cmd) {
        actions += `<button class="btn btn-copy" onclick="copyCmd(this,'${p.cmd.replace(/'/g,"\\'")}')">📋 Befehl<span class="copy-toast">Kopiert!</span></button>`;
      }
      if (p.path && !p.cmd) {
        actions += `<button class="btn btn-copy" onclick="copyCmd(this,'${p.path.replace(/'/g,"\\'")}')">📁 Pfad<span class="copy-toast">Kopiert!</span></button>`;
      }

      const tags = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');

      card.innerHTML = `
        <div class="card-head">
          <span class="card-icon">${p.icon}</span>
          <span class="card-title">${p.title}</span>
          <span class="card-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-tags">${tags}</div>
        ${actions ? `<div class="card-actions">${actions}</div>` : ''}`;

      grid.appendChild(card);
    });

    sec.appendChild(hdr);
    sec.appendChild(grid);
    main.appendChild(sec);
  });

  // Netlify section
  const netlifySection = document.createElement('div');
  netlifySection.className = 'section';
  netlifySection.innerHTML = `
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-icon">🌐</span>
      <span class="section-title">🌐 Netlify Landing Pages (DS24 Affiliate)</span>
      <span class="section-count">${NETLIFY.length}</span>
      <span class="section-toggle open">▶</span>
    </div>`;
  const netlifyGrid = document.createElement('div');
  netlifyGrid.id = 'netlify-grid';
  NETLIFY.forEach(n => {
    const d = document.createElement('div');
    d.className = 'netlify-card';
    d.innerHTML = `
      <div class="netlify-title">${n.title}${n.cat ? ' <span style="color:var(--warn);font-size:9px">KATEGORIE</span>' : ''}</div>
      <div class="netlify-url">bullpower-ai-tools.netlify.app/${n.slug}/</div>
      <a class="netlify-open" href="https://bullpower-ai-tools.netlify.app/${n.slug}/" target="_blank">→ Öffnen</a>`;
    netlifyGrid.appendChild(d);
  });
  netlifySection.appendChild(netlifyGrid);
  main.appendChild(netlifySection);

  // Update stats
  document.getElementById('s-total').textContent = PROJECTS.length;
  document.getElementById('s-live').textContent = PROJECTS.filter(p => p.status==='live').length;
  document.getElementById('s-local').textContent = PROJECTS.filter(p => p.status==='local').length;
  document.getElementById('s-railway').textContent = 9;
}

build();
</script>
