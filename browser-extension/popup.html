<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RudiBot Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 340px;
    min-height: 400px;
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
  }

  .header {
    background: linear-gradient(135deg, #1a1a3e, #0f0f2a);
    border-bottom: 1px solid rgba(99,102,241,0.3);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo { font-size: 28px; }

  .header-info h1 {
    font-size: 16px;
    font-weight: 700;
    color: #a78bfa;
  }

  #status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 3px;
  }

  .status-online { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .status-offline { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .status-online .status-dot { background: #22c55e; }
  .status-offline .status-dot { background: #ef4444; }

  .section {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 8px;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .qbtn {
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.2);
    color: #c0c0ff;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .qbtn:hover:not(:disabled) {
    background: rgba(99,102,241,0.25);
    color: #fff;
    border-color: rgba(99,102,241,0.5);
  }

  .qbtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .qbtn-full {
    grid-column: 1 / -1;
    justify-content: center;
    background: rgba(139,92,246,0.15);
    border-color: rgba(139,92,246,0.3);
  }

  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px 14px;
  }

  #messages {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 10px;
    height: 140px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12.5px;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 2px; }

  .msg { display: flex; gap: 6px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.15);
    border-radius: 8px;
    padding: 5px 9px;
    max-width: 85%;
    color: #d0d0ff;
    line-height: 1.4;
  }
  .msg.user .msg-bubble { background: rgba(99,102,241,0.2); }
  .msg-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .input-row {
    display: flex;
    gap: 6px;
  }

  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(99,102,241,0.2);
    color: #e0e0ff;
    padding: 7px 10px;
    border-radius: 7px;
    font-size: 12.5px;
    outline: none;
  }

  #chat-input:focus { border-color: rgba(99,102,241,0.5); }
  #chat-input::placeholder { color: rgba(255,255,255,0.25); }

  #send-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    color: white;
    padding: 7px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.15s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .dashboard-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: calc(100% - 28px);
    margin: 10px 14px;
    padding: 10px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
    border: 1px solid rgba(99,102,241,0.35);
    color: #a78bfa;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }

  .dashboard-btn:hover {
    background: linear-gradient(135deg, rgba(99,102,241,0.35), rgba(139,92,246,0.25));
    color: #fff;
  }

  #reply-result {
    font-size: 11px;
    color: #4ade80;
    padding: 4px 0;
    min-height: 16px;
    text-align: center;
  }

  .typing { display: flex; gap: 3px; align-items: center; padding: 3px 0; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%; background: #6366f1;
    animation: t 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes t { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)} }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🤖</div>
  <div class="header-info">
    <h1>RudiBot Assistant</h1>
    <div id="status-badge" class="status-offline">
      <span class="status-dot"></span>
      <span id="status-text">Verbinde...</span>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">⚡ Schnellbefehle</div>
  <div class="quick-grid">
    <button class="qbtn" data-cmd="status">📊 Bot Status</button>
    <button class="qbtn" data-cmd="shopify">🛒 Shopify</button>
    <button class="qbtn" data-cmd="social">📱 Social Media</button>
    <button class="qbtn" data-cmd="income">💰 Einnahmen</button>
    <button class="qbtn" data-cmd="analyze_page">🔍 Seite analysieren</button>
    <button class="qbtn" data-cmd="post_product">📤 Auto-Post</button>
  </div>
</div>

<div class="chat-area">
  <div id="messages">
    <div class="msg">
      <span class="msg-icon">🤖</span>
      <div class="msg-bubble">Bereit! Stelle mir eine Frage oder wähle einen Schnellbefehl.</div>
    </div>
  </div>
  <div class="input-row">
    <input id="chat-input" type="text" placeholder="Frage stellen..." />
    <button id="send-btn">▶</button>
  </div>
  <div id="reply-result"></div>
</div>

<button class="dashboard-btn" id="open-dashboard">
  🚀 RudiBot Dashboard öffnen
</button>

<script src="popup.js"></script>
</body>
</html>
